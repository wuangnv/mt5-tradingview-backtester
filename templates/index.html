<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Chart Tool - Bar Replay</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/lightweight-charts-drawing/dist/lightweight-charts-drawing.umd.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Toolbar -->
        <div class="top-toolbar">
            <div class="toolbar-section">
                <select id="symbol-select" class="symbol-select">
                    <option value="EURUSD">EURUSD</option>
                    <option value="GBPUSD">GBPUSD</option>
                    <option value="USDJPY">USDJPY</option>
                    <option value="AUDUSD">AUDUSD</option>
                    <option value="USDCAD">USDCAD</option>
                    <option value="XAUUSD">XAUUSD</option>
                </select>
            </div>
            
            <div class="toolbar-section timeframe-buttons">
                <button class="tf-btn" data-tf="M1">1m</button>
                <button class="tf-btn" data-tf="M5">5m</button>
                <button class="tf-btn" data-tf="M15">15m</button>
                <button class="tf-btn" data-tf="M30">30m</button>
                <button class="tf-btn active" data-tf="H1">1h</button>
                <button class="tf-btn" data-tf="H4">4h</button>
                <button class="tf-btn" data-tf="D1">1D</button>
                <button class="tf-btn" data-tf="W1">1W</button>
            </div>
            
            <div class="toolbar-section">
                <button id="replay-btn" class="toolbar-btn">
                    <span>▶</span> Replay
                </button>
            </div>
            
            <div class="toolbar-section layout-controls">
                <div class="layout-select-wrapper">
                    <button id="layout-btn" class="toolbar-btn" title="Select Layout">
                        <span>⊞</span> Layout
                    </button>
                    <div id="layout-dropdown" class="layout-dropdown">
                        <div class="layout-option active" data-layout="1" title="Single Chart">
                            <svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </div>
                        <div class="layout-option" data-layout="2v" title="2 Charts Vertical">
                            <svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="3" width="8" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </div>
                        <div class="layout-option" data-layout="2h" title="2 Charts Horizontal">
                            <svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3" y="13" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </div>
                        <div class="layout-option" data-layout="4" title="4 Charts Grid">
                            <svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="3" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3" y="13" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="13" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </div>
                    </div>
                </div>
                
                <button id="sync-scroll-btn" class="sync-btn active" title="Sync Time/Scroll: ON">
                    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 8a7 7 0 1 1 7 7c-.5 0-.9 0-1.4-.1a1 1 0 1 1 .2-2 5 5 0 1 0-3.8-5h1.5a1 1 0 1 1 0 2H1a1 1 0 0 1-1-1V5a1 1 0 1 1 2 0v1.5A7 7 0 0 1 1 8z" fill="currentColor"/></svg>
                </button>
                <button id="sync-crosshair-btn" class="sync-btn active" title="Sync Crosshair: ON">
                    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 0a1 1 0 0 1 1 1v6h6a1 1 0 1 1 0 2H9v6a1 1 0 1 1-2 0V9H1a1 1 0 1 1 0-2h6V1a1 1 0 0 1 1-1z" fill="currentColor"/></svg>
                </button>
            </div>
            
            <div class="toolbar-section">
                <select id="timezone-select" class="timezone-select">
                    <option value="0">UTC+0</option>
                    <option value="1">UTC+1</option>
                    <option value="2">UTC+2</option>
                    <option value="3">UTC+3</option>
                    <option value="7" selected>UTC+7 (Vietnam)</option>
                    <option value="8">UTC+8</option>
                    <option value="9">UTC+9</option>
                    <option value="-5">UTC-5 (EST)</option>
                    <option value="-4">UTC-4 (EDT)</option>
                </select>
                <div class="status-indicator" id="mt5-status">
                    <span class="status-dot"></span>
                    <span class="status-text">MT5</span>
                </div>
            </div>
        </div>
        
        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left Sidebar - Drawing Tools -->
            <div class="left-sidebar">
                <div class="tool-item active" data-tool="cursor" title="Cursor (Esc)">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <path d="M3 3 L3 17 L8 12 L11 17 L13 16 L10 11 L17 11 Z" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-separator"></div>
                
                <div class="tool-item" data-tool="trend-line" title="Trend Line">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <line x1="2" y1="18" x2="18" y2="2" stroke="currentColor" stroke-width="2"/>
                        <circle cx="2" cy="18" r="2" fill="currentColor"/>
                        <circle cx="18" cy="2" r="2" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="horizontal-line" title="Horizontal Line">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <line x1="0" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="2"/>
                        <circle cx="10" cy="10" r="2" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="ray" title="Ray">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <line x1="5" y1="15" x2="18" y2="5" stroke="currentColor" stroke-width="2"/>
                        <circle cx="5" cy="15" r="2.5" fill="currentColor"/>
                        <polygon points="18,5 15,9 13,7" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="arrow" title="Arrow">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <line x1="3" y1="17" x2="17" y2="3" stroke="currentColor" stroke-width="2"/>
                        <polygon points="17,3 11,5 15,9" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="extended-line" title="Extended Line">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <line x1="0" y1="20" x2="20" y2="0" stroke="currentColor" stroke-width="2"/>
                        <circle cx="7" cy="13" r="2" fill="currentColor"/>
                        <circle cx="13" cy="7" r="2" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="horizontal-ray" title="Horizontal Ray">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <line x1="6" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="2"/>
                        <circle cx="6" cy="10" r="2.5" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="rectangle" title="Rectangle">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <rect x="3" y="5" width="14" height="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="text" title="Text (T)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 5V3H16V5M10 3V17M7 17H13" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <div class="tool-item" data-tool="long-position" title="Long Position">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="14" height="7" fill="#089981" fill-opacity="0.3" stroke="#089981" stroke-width="1.5"/>
                        <rect x="3" y="10" width="14" height="7" fill="#f23645" fill-opacity="0.3" stroke="#f23645" stroke-width="1.5"/>
                        <circle cx="10" cy="10" r="2" fill="currentColor"/>
                    </svg>
                </div>
                
                <div class="tool-item" data-tool="short-position" title="Short Position">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="14" height="7" fill="#f23645" fill-opacity="0.3" stroke="#f23645" stroke-width="1.5"/>
                        <rect x="3" y="10" width="14" height="7" fill="#089981" fill-opacity="0.3" stroke="#089981" stroke-width="1.5"/>
                        <circle cx="10" cy="10" r="2" fill="currentColor"/>
                    </svg>
                </div>
                

                
                <div class="tool-item" data-tool="clear" title="Clear All Drawings">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <path d="M5 7 L7 5 L10 8 L13 5 L15 7 L12 10 L15 13 L13 15 L10 12 L7 15 L5 13 L8 10 Z" fill="currentColor"/>
                    </svg>
                </div>
            </div>
            
            <!-- Chart Area -->
            <div class="chart-area">
                <div id="charts-grid" class="charts-grid layout-1">
                    <!-- Dynamic chart panels will be injected here by ChartManager -->
                </div>
                
                <!-- Chart Info Overlay -->
                <div class="chart-info-overlay" id="chart-info">
                    <span id="ohlc-info"></span>
                </div>
            </div>
        </div>
        
        <!-- Bottom Bar Replay Controls -->
        <div class="bottom-bar" id="replay-controls" style="display: none;">
            <div class="replay-section">
                <button id="replay-play-pause" class="replay-btn" title="Play/Pause (Space)">
                    <span id="play-icon">▶</span>
                </button>
                <button id="replay-prev" class="replay-btn" title="Previous Bar (←)">⏮</button>
                <button id="replay-next" class="replay-btn" title="Next Bar (→)">⏭</button>
                <button id="replay-jump-mode" class="replay-btn-toggle" title="Jump Mode: OFF">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 2 L8 14 M2 8 L14 8 M8 2 L11 5 M8 2 L5 5 M8 14 L11 11 M8 14 L5 11" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    </svg>
                </button>
                <span class="replay-label">Controls</span>
            </div>
            
            <div class="replay-section">
                <label class="replay-label">Start Date:</label>
                <input type="datetime-local" id="replay-start-date" class="replay-date-input">
                <button id="replay-jump-date" class="replay-btn-text" title="Jump to Date">Go</button>
            </div>
            
            <div class="replay-section replay-slider-section">
                <input type="range" id="replay-slider" class="replay-slider" min="0" max="100" value="0">
                <span id="replay-progress" class="replay-progress">0 / 0</span>
                <span id="replay-current-date" class="replay-date-display"></span>
            </div>
            
            <div class="replay-section">
                <select id="replay-speed" class="replay-speed-select">
                    <option value="50">20x</option>
                    <option value="100">10x</option>
                    <option value="200">5x</option>
                    <option value="500">2x</option>
                    <option value="1000" selected>1x</option>
                    <option value="2000">0.5x</option>
                    <option value="4000">0.25x</option>
                </select>
                <span class="replay-hint" title="Space=Play/Pause | ←/→=Prev/Next | Shift+←/→=±10 bars">⌨️</span>
                <button id="replay-close" class="replay-btn" title="Close Replay (Esc)">✕</button>
            </div>
        </div>
    </div>
    
    <!-- Drawing Settings Modal -->
    <div id="drawing-settings-overlay" class="modal-overlay">
        <div class="settings-modal">
            <div class="modal-header">
                <span class="modal-title" id="settings-modal-title">Cài đặt vật thể</span>
                <button class="modal-close" id="settings-modal-close">&times;</button>
            </div>
            <div class="modal-body" id="settings-modal-body">
                <!-- Dynamic form fields will be injected here -->
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-delete" id="settings-modal-delete">Xóa</button>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-modal btn-modal-cancel" id="settings-modal-cancel">Hủy</button>
                    <button class="btn-modal btn-modal-save" id="settings-modal-save">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/chart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/replay.js') }}"></script>
</body>
</html>
